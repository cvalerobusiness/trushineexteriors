  <style>
    .quote-wrap{
      min-height: 100vh;
      display:flex;
      align-items:center;
      justify-content:center;
      padding: 48px 16px 64px;
      background: #f6f8fb;
    }
    .quote-card{
      width: 100%;
      max-width: 860px;
      border-radius: 18px;
      background: #fff;
      box-shadow: 0 18px 45px rgba(15, 23, 42, .10);
      overflow:hidden;
      border: 1px solid rgba(15, 23, 42, .06);
    }
    .quote-hero{
      padding: 34px 28px;
      background: radial-gradient(1200px 400px at 20% 0%, rgba(59,130,246,.25), transparent 60%),
                  linear-gradient(180deg, #0b1a33, #0a1630);
      color:#fff;
    }
    .quote-hero h1{
      margin:0 0 8px;
      font-size: clamp(28px, 3.2vw, 42px);
      letter-spacing:-.02em;
    }
    .quote-hero p{
      margin:0;
      opacity:.9;
      max-width: 58ch;
    }
    .quote-hero-top{
  display:flex;
  align-items:center;
  gap:18px;
}

.quote-logo{
  width:120px;
  height:auto;
  object-fit:contain;
}
    .quote-body{
      padding: 26px 28px 30px;
    }
    .grid{
      display:grid;
      grid-template-columns: 1fr 1fr;
      gap: 14px;
    }
    @media (max-width: 720px){
      .grid{ grid-template-columns: 1fr; }
      .quote-hero, .quote-body{ padding-left:18px; padding-right:18px; }
    }
    label{
      display:block;
      font-size: 13px;
      font-weight: 700;
      color:#0b1a33;
      margin: 8px 0 6px;
    }
    input, select, textarea{
      width:100%;
      border: 1px solid rgba(15, 23, 42, .14);

      font-size: 15px;
      outline:none;
      background:#fff;
    }
    input:focus, select:focus, textarea:focus{
      border-color: rgba(59,130,246,.65);
      box-shadow: 0 0 0 4px rgba(59,130,246,.15);
    }
    textarea{ min-height: 140px; resize: vertical; }
    .actions{
      margin-top: 14px;
      display:flex;
      gap: 12px;
      align-items:center;
      justify-content:flex-start;
      flex-wrap:wrap;
    }
    .btn-primary{
      appearance:none;
      border:0;
      background: linear-gradient(180deg, #2b7de9, #1b63c0);
      color:#fff;
      padding: 12px 16px;
      border-radius: 12px;
      font-weight: 800;
      font-size: 15px;
      cursor:pointer;
      min-width: 220px;
      display:inline-flex;
      align-items:center;
      justify-content:center;
      gap:10px;
    }
    .btn-primary[disabled]{ opacity:.70; cursor:not-allowed; }
    .small-note{
      font-size: 13px;
      color: rgba(15, 23, 42, .70);
    }
    .success, .error{
      margin-top: 12px;
      padding: 12px 12px;
      border-radius: 12px;
      font-weight: 800;
      display:none;
      transform: translateY(6px) scale(.98);
      opacity: 0;
    }
    .success{ background: rgba(16,185,129,.12); color: #065f46; }
    .error{ background: rgba(239,68,68,.10); color: #7f1d1d; }

    /* animation */
    .pop-in{
      display:block !important;
      animation: popIn .28s ease-out forwards;
    }
    @keyframes popIn{
      from { opacity:0; transform: translateY(8px) scale(.98); }
      to   { opacity:1; transform: translateY(0)   scale(1); }
    }
  </style>
</head>

<body>
  <div class="quote-wrap">
    <div class="quote-card">
     <div class="quote-hero">
  <div class="quote-hero-top">
    <img src="/assets/trushine-logo.png" alt="TruShine Logo" class="quote-logo">
    <div>
      <h1>Request a Free Quote</h1>
      <p>Tell us a little about your home and what you need cleaned. We’ll respond promptly.</p>
    </div>
  </div>
</div>

      <div class="quote-body">
        <!-- IMPORTANT: no _redirect here. This stays on-page. -->
        <form id="quoteForm" action="https://formspree.io/f/xbdabkyg" method="POST" novalidate>
          <input type="hidden" name="_subject" value="New TruShine Quote Request" />

          <div class="grid">
            <div>
              <label for="name">Full Name</label>
              <input id="name" name="Full Name" type="text" autocomplete="name" required placeholder="Full Name" />
            </div>

            <div>
              <label for="email">Email Address</label>
              <input id="email" name="Email" type="email" autocomplete="email" required placeholder="Email Address" />
            </div>

            <div>
              <label for="phone">Phone Number</label>
              <input id="phone" name="Phone" type="tel" autocomplete="tel" required placeholder="Phone Number" />
            </div>

            <div>
              <label for="service">Service Needed</label>
              <select id="service" name="Service" required>
                <option value="" selected disabled>Select a service</option>
                <option>Window Cleaning</option>
                <option>Interior + Exterior Windows</option>
                <option>Exterior Windows</option>
                <option>Screen Cleaning</option>
                <option>Track/Frame Detail</option>
                <option>Other (describe below)</option>
              </select>
            </div>

            <div style="grid-column: 1 / -1;">
              <label for="address">Property Address (optional)</label>
              <input id="address" name="Address" type="text" autocomplete="street-address" placeholder="Property Address (optional)" />
            </div>

            <div style="grid-column: 1 / -1;">
              <label for="message">Tell us about your home and what services you need</label>
              <textarea id="message" name="Message" required placeholder="Tell us about your home and what services you need..."></textarea>
            </div>
          </div>

          <div class="actions">
            <button class="btn-primary" id="submitBtn" type="submit">Submit Quote Request</button>
            <div class="small-note">
              Or email us directly at <a href="mailto:info@trushineexteriors.com">info@trushineexteriors.com</a>
            </div>
          </div>

          <div class="success" id="successBox">✅ Sent! We’ll get back to you shortly.</div>
          <div class="error" id="errorBox">❌ Something went wrong. Please try again or email us directly.</div>
        </form>
      </div>
    </div>
  </div>

  <!-- SCRIPT MUST BE AFTER THE FORM so it can find #quoteForm -->
  <script>
    (function () {
      const form = document.getElementById("quoteForm");
      const btn = document.getElementById("submitBtn");
      const successBox = document.getElementById("successBox");
      const errorBox = document.getElementById("errorBox");

      if (!form) return;

      form.addEventListener("submit", async function (e) {
        e.preventDefault();
        e.stopPropagation();

        // reset messages
        if (successBox) { successBox.style.display = "none"; successBox.classList.remove("pop-in"); }
        if (errorBox) { errorBox.style.display = "none"; errorBox.classList.remove("pop-in"); }

        // button state
        const originalText = btn ? btn.textContent : "";
        if (btn) { btn.disabled = true; btn.textContent = "Sending…"; }

        try {
          const formData = new FormData(form);

          const res = await fetch(form.action, {
            method: "POST",
            body: formData,
            headers: { "Accept": "application/json" }
          });

          if (res.ok) {
            form.reset();

            if (successBox) {
              successBox.style.display = "block";
              // trigger animation
              requestAnimationFrame(() => successBox.classList.add("pop-in"));
            }

            if (btn) {
              btn.textContent = "Sent ✅";
              setTimeout(() => {
                btn.disabled = false;
                btn.textContent = originalText;
              }, 2200);
            }
          } else {
            if (errorBox) {
              errorBox.style.display = "block";
              requestAnimationFrame(() => errorBox.classList.add("pop-in"));
            }
            if (btn) { btn.disabled = false; btn.textContent = originalText; }
          }
        } catch (err) {
          if (errorBox) {
            errorBox.style.display = "block";
            requestAnimationFrame(() => errorBox.classList.add("pop-in"));
          }
          if (btn) { btn.disabled = false; btn.textContent = originalText; }
        }
      });
    })();
  </script>
</body>
</html>
