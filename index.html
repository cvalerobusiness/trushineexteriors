<script>
(function () {
  // 1) If someone types a "pretty" URL, redirect to the real HTML file
  const path = (window.location.pathname || "").toLowerCase();

  // Anything quote/contact-ish should go to quote.html
  const quotePaths = [
    "/quote",
    "/get-quote",
    "/get-a-quote",
    "/request-quote",
    "/contact"
  ];

  if (quotePaths.includes(path)) {
    window.location.replace("/quote.html");
    return;
  }

  // 2) Intercept clicks on the site and route correctly
  document.addEventListener(
    "click",
    function (e) {

      // If they clicked a link
      const a = e.target.closest("a");
      if (a) {
        const hrefRaw = (a.getAttribute("href") || "").trim();
        const clean = hrefRaw.split("?")[0].split("#")[0].toLowerCase();

        // Send BOTH contact + quote links to quote.html
        if (
          clean === "/contact" || clean === "contact" || clean === "/contact.html" ||
          clean === "/quote" || clean === "quote" || clean === "/quote.html" ||
          clean === "/get-quote" || clean === "/get-a-quote" || clean === "/request-quote"
        ) {
          e.preventDefault();
          window.location.href = "/quote.html";
          return;
        }
      }

      // If they clicked a button (Get a Quote / Contact / Request Quote)
      const btn = e.target.closest("button,[role='button']");
      if (btn) {
        const text = (btn.textContent || "").toLowerCase();

        if (
          text.includes("get a quote") ||
          text.includes("request a quote") ||
          text.includes("free quote") ||
          text.includes("contact")
        ) {
          e.preventDefault();
          window.location.href = "/quote.html";
          return;
        }
      }
    },
    true
  );
})();
</script>
