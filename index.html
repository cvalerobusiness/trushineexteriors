  <script>
  (function () {
    var p = new URLSearchParams(window.location.search);
    var r = p.get("redirect");
    if (r) {
      p.delete("redirect");
      var newUrl = decodeURIComponent(r);
      // Clean the URL bar without reloading
      window.history.replaceState(null, "", newUrl);
    }
  })();
</script>
  <body>
    <div id="root"></div>
 <script>
  (function () {
    function goToContact() {
      window.location.href = "/contact.html";
    }

    // If someone lands on the Base44 route directly, bounce them to the real contact page
    const path = (window.location.pathname || "").toLowerCase();
    const contactPaths = ["/contact", "/quote", "/get-quote", "/get-a-quote", "/request-quote"];
    if (contactPaths.includes(path)) {
      goToContact();
      return;
    }

    // Intercept clicks on links/buttons anywhere on the page
    document.addEventListener(
      "click",
      function (e) {
        // Catch <a href="/Contact">, <a href="/contact">, etc.
        const a = e.target.closest("a");
        if (a) {
          const href = (a.getAttribute("href") || "").trim();
          const clean = href.split("?")[0].split("#")[0].toLowerCase();

          if (
            clean === "/contact" ||
            clean === "contact" ||
            clean === "/quote" ||
            clean === "/get-quote" ||
            clean === "/get-a-quote" ||
            clean === "/request-quote"
          ) {
            e.preventDefault();
            goToContact();
            return;
          }
        }

        // Catch buttons (and "button-like" elements)
        const btn = e.target.closest("button,[role='button']");
        if (btn) {
          const text = (btn.textContent || "").toLowerCase();
          if (
            text.includes("get a quote") ||
            text.includes("free quote") ||
            text.includes("request a quote")
          ) {
            e.preventDefault();
            goToContact();
            return;
          }
        }
      },
      true
    );
  })();
</script>
