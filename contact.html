<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Request a Quote | TruShine Exterior Care</title>
  <link rel="icon" type="image/png" href="/favicon.png" />
  <style>
    body {
      font-family: Arial, sans-serif;
      background: #f8f9fb;
      margin: 0;
      padding: 40px 20px;
    }
    .container {
      max-width: 600px;
      margin: auto;
      background: white;
      padding: 30px;
      border-radius: 10px;
      box-shadow: 0 10px 30px rgba(0,0,0,0.08);
    }
    h1 {
      text-align: center;
      margin-bottom: 20px;
    }
    input, textarea {
      width: 100%;
      padding: 12px;
      margin-bottom: 15px;
      border-radius: 6px;
      border: 1px solid #ddd;
      font-size: 16px;
    }
    button {
      width: 100%;
      padding: 14px;
      background: #1e2f4d;
      color: white;
      border: none;
      border-radius: 6px;
      font-size: 16px;
      cursor: pointer;
    }
    button:hover {
      opacity: 0.9;
    }
    .alt-contact {
      text-align: center;
      margin-top: 20px;
      font-size: 14px;
    }
  </style>
</head>
<body>

  <div class="container">
    <h1>Request a Free Quote</h1>

    <form action="https://formspree.io/f/xbdabkyg" method="POST">
      <input type="hidden" name="_subject" value="New TruShine Quote Request" />

      <input type="text" name="name" placeholder="Full Name" required />
      <input type="email" name="email" placeholder="Email Address" required />
      <input type="tel" name="phone" placeholder="Phone Number" />
      <input type="text" name="address" placeholder="Property Address (optional)" />
      <textarea name="message" rows="5" placeholder="Tell us what you need cleaned..." required></textarea>

      <button type="submit">Submit Quote Request</button>
    </form>

    <div class="alt-contact">
      Or email us directly at  
      <a href="mailto:info@trushineexteriors.com">
        info@trushineexteriors.com
      </a>
    </div>
  </div>

</body>
</html>
